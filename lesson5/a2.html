<!DOCTYPE html>
<html>
    <body>
        <h2>Javascript Methods</h2>
        <p id="join"></p>
        <p id="pop"></p>
        <p id="pop2"></p>
        <script>
            var fruits= ["Apple", "Banana", "Mango"];
            document.getElementById("join").innerHTML= fruits.join("*");
            fruits.pop;
            document.getElementById("join").innerHTML= fruits;
        </script>
    </body>
</html>
