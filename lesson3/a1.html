<!DOCTYPE html>
<html>
<head>

</head>
<body>
    <h2>Numbers from 1-10</h2>
    <div id="demo"></div>
    <h2>Even Numbers from 1-10</h2>
    <div id="demo_even"></div>
    <h2>Multiplied Numbers from 1-10</h2>
    <div id="demo_mul"></div>
    <script>
        var text=""
        for(var i=1; i<=10; i++){
            text=text+i+"<br>"
        }
        document.getElementById("demo").innerHTML=text
        text = ""
        for (var i = 0; i <= 10; i=i+2) {
            text = text + i + "<br>"
        }
        document.getElementById("demo_even").innerHTML = text
        text = ""
        for (var i = 0; i <= 10; i++) {
            // text += "5 × " + i + " = " + (5 * i) + "<br>";
            text = text + "5 × " + i + " = " + (5 * i) + "<br>";

        }
        document.getElementById("demo_mul").innerHTML = text
    </script>
</body>
</html>
